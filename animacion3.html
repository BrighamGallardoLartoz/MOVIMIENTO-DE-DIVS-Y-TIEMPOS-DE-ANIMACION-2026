<html> 
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative;/* para entrar el div */
            margin: 0 auto;/* para centrar el div */

            overflow: hidden;/* muestra solo lo interior */
        }
        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;/* permite mover el div dentro del contenedor */

            top: -100px;
            left: -200px;

            animation: cuadrito 6s infinite linear;
        }
        @keyframes cuadrito{
            form{
                top: -100px;
                left: -100px;
            }
            to{
                top: 250px;
                left: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">

        <div class="cuadrito"></div>

    </div>

</body>

</html>
