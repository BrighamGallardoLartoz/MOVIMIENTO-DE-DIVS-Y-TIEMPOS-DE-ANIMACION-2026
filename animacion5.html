<html> 
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 800px;
            height: 400px;
            border: 1px solid black;
            position: relative;/* para entrar el div */
            margin: 0 auto;/* para centrar el div */
            overflow: hidden;/* muestra solo lo interior */
        }
        .gala{
            width: 100px;
            height: 100px;
            position: absolute;/* permite mover el div dentro del contenedor */
            top: 150px;
            left: 350px;
            animation: gala 2s infinite alternate;
        }
        .gala img{
            width: 100px;
            height: 100px;
        }
        .estrella{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella .75s infinite linear;
            top: 40px;
        }
        
        @keyframes estrella{
            from{
                right: -40px;
            }
            to{
                right: 840px;
            }
        }
        .estrella1{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella1 1s infinite linear;
            top: 150px;
        }
        @keyframes estrella1{
            from{
                right: -40px;
            }
            to{
                right: 840px;
            }
        }
        .estrella2{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella2 2.5s infinite linear;
            top: 250px;
        }
        @keyframes estrella2{
            from{
                right: -40px;
            }
            to{
                right: 840px;
            }
        }
        .estrella3{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella3 .9s infinite linear;
            top: 350px;
        }
        @keyframes estrella3{
            from{
                right: -40px;
            }
            to{
                right: 840px;
            }
        }
        .estrella4{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella4 1.5s infinite linear;
            top: 450px;
        }
        @keyframes estrella4{
            from{
                right: -40px;
            }
            to{
                right: 840px;
            }
        }
        .estrella6{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella6 1.5s infinite linear;
            bottom: -40px;
            right: -40px;

        }
        @keyframes estrella6{
            from{
                right: -40px;
                bottom: -40px;
            }
            to{
                right: 840px;
                bottom: 350px;
            }
        }
        .estrella5{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella5 1.5s infinite linear;
            bottom: -50px;
            right: -70px;
        }
        @keyframes estrella5{
            from{
                right: -40px;
                bottom: 60px;
            }
            to{
                right: 840px;
                bottom: 200px;
            }
        }
        .estrella7{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella7 1.5s infinite linear;
            top: -80px;
            right: -30px;
        }
        @keyframes estrella7{
            from{
                right: -40px;
                top: 60px;
            }
            to{
                right: 840px;
                top: 200px;
            }
        }
        .estrella8{
            width: 10px;
            height: 10px;
            background-color: white;
            position: absolute;
            animation: estrella8 1s infinite linear;
            top: -50px;
            right: -100px;
        }
        @keyframes estrella8{
            from{
                right: -40px;
                top: 0px;
            }
            to{
                right: 840px;
                top: 200px;
            }
        }
        @keyframes gala{
            from{
                rotate: -10deg;
            }
            to{
                rotate: 20deg;
            }
        }
        .noche{
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .noche img{
            width: 100%;
            height: 100%;
            }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="estrella">
        </div>
        <div class="estrella1">
        </div>
        <div class="estrella2">
        </div>
        <div class="estrella3">
        </div>
        <div class="estrella4">
        </div>
        <div class="estrella5">
        </div>
        <div class="estrella6">
        </div>
        <div class="estrella7">
        </div>
        <div class="estrella8">
        </div>
        <div class="cielo">
            <img src="img/noche.jpg">
        </div>

        <div class="gala">
            <img src="img/gala.png" alt="">
        </div>
    </div>
</body>
</html>
